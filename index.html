<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Chatbot with Voice & File Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 100%;
            max-width: 800px;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        .tab {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            color: #666;
        }

        .tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-content {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-content.active {
            display: flex;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .user-message .text {
            background: #667eea;
            color: white;
            border-radius: 15px;
            padding: 10px 15px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 14px;
        }

        .bot-message {
            justify-content: flex-start;
        }

        .bot-message .text {
            background: #e9ecef;
            color: #333;
            border-radius: 15px;
            padding: 10px 15px;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .file-preview {
            max-width: 70%;
            padding: 10px;
            background: #e9ecef;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: white;
            border-radius: 5px;
            font-size: 12px;
        }

        .image-preview {
            max-width: 150px;
            border-radius: 5px;
            margin-top: 8px;
        }

        .sample-questions {
            padding: 10px 15px;
            font-size: 12px;
            color: #666;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            flex-shrink: 0;
        }

        .sample-questions p {
            margin-bottom: 8px;
            font-weight: 500;
        }

        .sample-questions button {
            display: inline-block;
            background: transparent;
            color: #667eea;
            border: 0.5px solid #667eea;
            border-radius: 4px;
            padding: 4px 8px;
            margin: 2px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .sample-questions button:hover {
            background: #667eea;
            color: white;
        }

        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        input[type="text"] {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 12px 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
            white-space: nowrap;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .upload-btn {
            background: transparent;
            color: #667eea;
            border: 1px solid #667eea;
            padding: 10px 15px;
        }

        .upload-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .voice-btn {
            background: transparent;
            color: #667eea;
            border: 1px solid #667eea;
            padding: 10px 15px;
            font-size: 16px;
        }

        .voice-btn:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .voice-btn.listening {
            background: #ff4757;
            color: white;
            border-color: #ff4757;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(255, 71, 87, 0);
            }
        }

        #fileInput {
            display: none;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        .voice-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #ff4757;
            color: white;
            border-radius: 20px;
            display: none;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
        }

        .voice-status.show {
            display: block;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 JIMS Placement Chatbot</h1>
            <p>Chat, speak, or upload study materials!</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('placement')">Placement Info</button>
            <button class="tab" onclick="switchTab('study')">Study Helper</button>
        </div>

        <!-- Content Area -->
        <div class="content-area">
            <!-- Placement Info Tab -->
            <div id="placement" class="tab-content active">
                <div class="chat-box" id="placementChatBox"></div>
                
                <div class="sample-questions">
                    <p>Quick questions:</p>
                    <button onclick="askQuestion('What is TCS CGPA requirement?', 'placement')">TCS CGPA</button>
                    <button onclick="askQuestion('Which companies visit JIMS?', 'placement')">Companies</button>
                    <button onclick="askQuestion('What is the average CTC?', 'placement')">Average CTC</button>
                    <button onclick="askQuestion('Tell me about Infosys', 'placement')">Infosys</button>
                    <button onclick="askQuestion('What are selection process rounds?', 'placement')">Selection</button>
                </div>
            </div>

            <!-- Study Helper Tab -->
            <div id="study" class="tab-content">
                <div class="chat-box" id="studyChatBox"></div>
                
                <div class="sample-questions">
                    <p>📤 Upload files to get AI help</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Ask your question or speak..." 
                onkeypress="handleKeyPress(event)"
            >
            <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()" title="Click to speak">🎤</button>
            <button class="upload-btn" onclick="document.getElementById('fileInput').click()" title="Upload file">📎</button>
            <button onclick="sendMessage()" title="Send message">Send</button>
            <input type="file" id="fileInput" accept="image/*,.pdf,.txt" onchange="handleFileUpload(event)">
        </div>
    </div>

    <!-- Voice Status Indicator -->
    <div class="voice-status" id="voiceStatus">
        🎤 Listening...
    </div>

    <script>
        let currentTab = 'placement';
        const placementChatBox = document.getElementById('placementChatBox');
        const studyChatBox = document.getElementById('studyChatBox');
        const userInput = document.getElementById('userInput');
        const voiceBtn = document.getElementById('voiceBtn');
        const voiceStatus = document.getElementById('voiceStatus');
        const API_URL = 'http://localhost:5000/query';
        const UPLOAD_URL = 'http://localhost:5000/upload-file';

        // Voice Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        // Initialize Speech Recognition if available
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                isListening = true;
                voiceBtn.classList.add('listening');
                voiceStatus.classList.add('show');
            };

            recognition.onend = function() {
                isListening = false;
                voiceBtn.classList.remove('listening');
                voiceStatus.classList.remove('show');
            };

            recognition.onresult = function(event) {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }

                // Update input with recognized text
                if (finalTranscript) {
                    userInput.value = finalTranscript.trim();
                } else if (interimTranscript) {
                    userInput.value = interimTranscript;
                }
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);
                voiceStatus.textContent = '❌ Error: ' + event.error;
                voiceStatus.classList.add('show');
                setTimeout(() => {
                    voiceStatus.classList.remove('show');
                }, 3000);
            };
        }

        function toggleVoice() {
            if (!recognition) {
                alert('Speech Recognition not supported in your browser. Use Chrome, Edge, or Safari.');
                return;
            }

            if (isListening) {
                recognition.stop();
                isListening = false;
                voiceBtn.classList.remove('listening');
            } else {
                recognition.start();
            }
        }

        // Track if tabs have been used
        let placementInitialized = false;
        let studyInitialized = false;

        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update content
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab).classList.add('active');

            // Initialize tab on first use
            if (tab === 'placement' && !placementInitialized) {
                addMessage('Hi! 👋 Ask me anything about JIMS placements, companies, or interviews! You can type, speak (🎤), or ask the quick questions below.', false);
                placementInitialized = true;
            } else if (tab === 'study' && !studyInitialized) {
                addMessage('📚 Upload your study notes or interview prep images! I can summarize, create questions, and help you prepare. You can also speak your questions (🎤).', false);
                studyInitialized = true;
            }

            userInput.focus();
        }

        function getChatBox() {
            return currentTab === 'placement' ? placementChatBox : studyChatBox;
        }

        function addMessage(text, isUser) {
            const chatBox = getChatBox();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text';
            textDiv.textContent = text;
            
            messageDiv.appendChild(textDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showLoading() {
            const chatBox = getChatBox();
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot-message';
            messageDiv.id = 'loadingMessage';
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text loading';
            textDiv.innerHTML = '<span></span><span></span><span></span>';
            
            messageDiv.appendChild(textDiv);
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeLoading() {
            const loadingMessage = document.getElementById('loadingMessage');
            if (loadingMessage) {
                loadingMessage.remove();
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const chatBox = getChatBox();
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user-message';
                
                const preview = document.createElement('div');
                preview.className = 'file-preview';
                
                if (file.type.startsWith('image/')) {
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `<span>🖼️</span> <span>${file.name}</span>`;
                    preview.appendChild(item);
                    
                    const img = document.createElement('img');
                    img.className = 'image-preview';
                    img.src = e.target.result;
                    preview.appendChild(img);
                } else {
                    const icon = file.type === 'application/pdf' ? '📄' : '📝';
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.innerHTML = `<span>${icon}</span> <span>${file.name}</span>`;
                    preview.appendChild(item);
                }
                
                messageDiv.appendChild(preview);
                chatBox.appendChild(messageDiv);
                chatBox.scrollTop = chatBox.scrollHeight;

                // Send to backend
                analyzeFile(file);
            };

            if (file.type.startsWith('image/')) {
                reader.readAsDataURL(file);
            } else {
                reader.readAsText(file);
            }

            event.target.value = '';
        }

        async function analyzeFile(file) {
            showLoading();

            const formData = new FormData();
            formData.append('file', file);
            formData.append('question', '');

            try {
                const response = await fetch(UPLOAD_URL, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                removeLoading();

                if (data.success) {
                    addMessage(`📤 File: ${file.name}\n\n${data.analysis || 'File analyzed successfully'}`, false);
                } else {
                    addMessage(`Error: ${data.error || 'File analysis failed'}`, false);
                }
            } catch (error) {
                removeLoading();
                addMessage('Error: Could not connect to the server.', false);
            }
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';
            userInput.focus();

            showLoading();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: message })
                });

                const data = await response.json();
                removeLoading();

                if (data.answer) {
                    addMessage(data.answer, false);
                } else {
                    addMessage('Sorry, I could not process your question.', false);
                }
            } catch (error) {
                removeLoading();
                addMessage('Error: Could not connect to the server.', false);
            }
        }

        function askQuestion(question, tab) {
            if (currentTab !== tab) {
                document.querySelector(`button[onclick="switchTab('${tab}')"]`).click();
            }
            userInput.value = question;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            addMessage('Hi! 👋 Ask me anything about JIMS placements, companies, or interviews! You can type, speak (🎤), or ask the quick questions below.', false);
            placementInitialized = true;
            userInput.focus();
        });
    </script>
</body>
</html>
